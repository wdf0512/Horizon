name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 1 * * *'  # Every day at UTC 01:00 = Beijing 09:00
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          TELEGRAM_WEBHOOK_URL: ${{ secrets.TELEGRAM_WEBHOOK_URL }}
        run: uv run horizon --hours 48

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Publish digest to personal blog
        continue-on-error: true
        env:
          BLOG_REPO_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
        run: uv run python scripts/to_blog_post.py

      - name: Sync digest to Obsidian vault (main + compliance)
        continue-on-error: true
        env:
          OBSIDIAN_VAULT_TOKEN: ${{ secrets.OBSIDIAN_VAULT_TOKEN }}
        run: uv run python scripts/to_obsidian_vault.py

      - name: Create digest entry in Notion database (main + compliance)
        continue-on-error: true
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_ID_ZH: ${{ secrets.NOTION_DB_ID_ZH }}
          NOTION_DB_ID_EN: ${{ secrets.NOTION_DB_ID_EN }}
          # Optional: if set, compliance digest goes to its own Notion DB.
          # Unset → falls back to NOTION_DB_ID_{ZH,EN} with title suffix " · 合规".
          NOTION_DB_ID_COMPLIANCE_ZH: ${{ secrets.NOTION_DB_ID_COMPLIANCE_ZH }}
          NOTION_DB_ID_COMPLIANCE_EN: ${{ secrets.NOTION_DB_ID_COMPLIANCE_EN }}
        run: uv run python scripts/to_notion.py

      - name: Commit data/summaries back to main (audit trail)
        # Keeps a record of which digest files were generated each run,
        # so you can later inspect when compliance fired vs no items matched.
        run: |
          if [[ -n "$(git status --porcelain data/summaries/)" ]]; then
            git config user.name "horizon-bot[bot]"
            git config user.email "horizon-bot@users.noreply.github.com"
            git add data/summaries/
            git commit -m "data: daily summaries ${{ env.DATE }} (incl. compliance variant if any)"
            git push origin main
          else
            echo "data/summaries/ unchanged — nothing to commit"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
